<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Lite Premium</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@formkit/auto-animate@0.8.1/index.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/sidebar.css">
    <link rel="stylesheet" href="styles/chat.css">
    <link rel="stylesheet" href="styles/animations.css">
</head>
<body>

    <!-- Mobile Sidebar Backdrop -->
    <div id="sidebar-backdrop"></div>

    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <button id="new-chat-btn" class="new-chat-btn">
                <i data-lucide="plus" style="width:16px; height:16px;"></i> New Chat
            </button>
        </div>
        
        <div class="history-list" id="history-list">
            <!-- Chats loaded dynamically -->
        </div>
        
        <div class="sidebar-footer">
            <button id="open-settings-btn" class="settings-btn">
                <i data-lucide="settings" style="width:16px; height:16px;"></i> Settings
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main id="main">
        <header class="topbar">
            <button id="toggle-sidebar-btn" class="icon-btn">
                <i data-lucide="menu" style="width:20px; height:20px;"></i>
            </button>
            <div style="font-weight:600; color:var(--text-primary); font-size: 14px;">Cloud Lite</div>
            <div style="width:36px;"></div> <!-- Spacer to center title -->
        </header>

        <section id="chat-container">
            <div class="messages-list" id="messages-container">
                <!-- Messages appended incrementally here -->
            </div>
        </section>

        <div class="input-wrapper">
            <form id="chat-form">
                <textarea id="message-input" placeholder="Ask anything, or type /prompt..." required autocomplete="off" rows="1"></textarea>
                <button type="submit" id="send-btn" disabled>
                    <i data-lucide="arrow-up" style="width:18px; height:18px;"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="close-settings-btn" class="icon-btn"><i data-lucide="x" style="width:20px;height:20px;"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Theme</label>
                    <select id="theme-select" class="form-control">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Shared Model Config (JSON)</label>
                    <textarea id="models-textarea" class="form-control" style="height: 150px; font-family: var(--font-mono); resize: vertical;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings-btn" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Initialization Script -->
    <script type="module">
        import { setupMarkdown } from './components/utils.js';
        import { initSidebar, loadChats } from './components/sidebar.js';
        import { initChat } from './components/chat.js';
        import { initSettings } from './components/settings.js';

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            setupMarkdown();
            
            initSidebar();
            initChat();
            initSettings();
            
            // Load chats on boot
            await loadChats();
        });
    </script>
</body>
</html>
