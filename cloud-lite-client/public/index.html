<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Lite - Raycast Style</title>
    
    <!-- Markdown and Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Icons -->
    <link href="https://unpkg.com/lucide@latest/style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-base: #0E0F12;
            --bg-sidebar: #13151A;
            --bg-panel: #1A1C23;
            --bg-hover: #262933;
            --text-primary: #ECECF1;
            --text-secondary: #9BA1A6;
            --accent: #5E6AD2;
            --accent-hover: #737EDB;
            --border: #2B2D38;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "Fira Code", "JetBrains Mono", monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 15px;
            line-height: 1.6;
        }

        /* Sidebar */
        #sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        #sidebar.hidden {
            transform: translateX(-100%);
            width: 0;
            border-right: none;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .new-chat-btn {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            transition: background 0.2s;
        }
        .new-chat-btn:hover { background-color: var(--bg-hover); }

        .history-list { flex: 1; overflow-y: auto; padding: 0 10px; }
        .history-item {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item.active, .history-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
        .settings-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 8px;
            border-radius: 6px;
        }
        .settings-btn:hover { background-color: var(--bg-hover); color: var(--text-primary); }

        /* Main Content */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Topbar */
        .topbar {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
        }
        .toggle-sidebar {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
        }
        .toggle-sidebar:hover { color: var(--text-primary); background: var(--bg-hover); }

        /* Chat Area */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .messages-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .message {
            padding: 16px 20px;
            border-radius: 12px;
            position: relative;
            word-wrap: break-word;
        }

        .message.user {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            align-self: flex-end;
            max-width: 85%;
        }

        .message.assistant {
            background-color: transparent;
            align-self: flex-start;
            width: 100%;
        }

        .message-content { overflow-x: auto; }
        
        /* Markdown Styles */
        .message-content p { margin-bottom: 1em; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content pre {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 1em 0;
        }
        .message-content code {
            font-family: var(--font-mono);
            font-size: 13px;
            background-color: var(--bg-hover);
            padding: 2px 4px;
            border-radius: 4px;
        }
        .message-content pre code { background: none; padding: 0; }
        .message-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1em;
            color: var(--text-secondary);
            margin: 1em 0;
        }

        /* Message Footer (Tags and Actions) */
        .msg-footer {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .model-tag {
            background: var(--bg-hover);
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .action-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
        .action-btn.build-prompt { color: #EAB308; }
        .action-btn.build-prompt:hover { background: rgba(234, 179, 8, 0.1); }

        /* Input Area (Raycast style) */
        .input-wrapper {
            padding: 20px;
            display: flex;
            justify-content: center;
            background: linear-gradient(transparent, var(--bg-base) 20%);
        }
        
        #form {
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        #input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(94, 106, 210, 0.2);
        }

        #btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--text-primary);
            color: var(--bg-base);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        #btn:hover:not(:disabled) { transform: translateY(-50%) scale(1.05); }
        #btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Settings Modal */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 500px;
            max-width: 90%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .modal-content h3 { font-size: 18px; margin-bottom: 8px; }
        .modal-content textarea {
            width: 100%;
            height: 200px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            resize: vertical;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-outline {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-primary); padding: 8px 16px; border-radius: 6px; cursor: pointer;
        }
        .btn-primary {
            background: var(--accent); border: none;
            color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        /* Build Prompt Block */
        .build-prompt-block {
            background: var(--bg-panel);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        .build-prompt-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
            color: var(--accent); font-weight: bold; font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">
                <i data-lucide="plus" style="width: 16px; height: 16px;"></i> New Chat
            </button>
        </div>
        <div class="history-list">
            <div class="history-item active">Current Shared Chat</div>
        </div>
        <div class="sidebar-footer">
            <button class="settings-btn" onclick="openSettings()">
                <i data-lucide="settings" style="width: 16px; height: 16px;"></i> Shared Models
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main">
        <div class="topbar">
            <button class="toggle-sidebar" onclick="toggleSidebar()">
                <i data-lucide="menu" style="width: 20px; height: 20px;"></i>
            </button>
        </div>

        <div id="chat">
            <div class="messages-container" id="messages-container">
                <!-- Messages will be injected here -->
            </div>
        </div>

        <div class="input-wrapper">
            <form id="form">
                <input type="text" id="input" placeholder="Ask anything, or type /prompt..." required autocomplete="off">
                <button type="submit" id="btn">
                    <i data-lucide="arrow-up" style="width: 18px; height: 18px;"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal">
        <div class="modal-content">
            <h3>Shared Model Config</h3>
            <p style="color: var(--text-secondary); font-size: 13px;">Edit the fallback model list JSON. The first model is the Default.</p>
            <textarea id="models-textarea"></textarea>
            <div class="modal-actions">
                <button class="btn-outline" onclick="closeSettings()">Cancel</button>
                <button class="btn-primary" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let messages = [];
        const container = document.getElementById('messages-container');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');
        const chatDiv = document.getElementById('chat');

        // Configure marked.js for highlight
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        function newChat() {
            alert("This cloud-lite client writes to a single shared chat row right now. Real multichat sync requires user auth mapping.");
        }

        async function copyText(text) {
            try {
                await navigator.clipboard.writeText(text);
            } catch (err) {
                console.error('Failed to copy', err);
            }
        }

        async function generateBuildPrompt(msgIndex) {
            // Get context up to this message
            const context = messages.slice(0, msgIndex + 1);
            
            // Show loading state directly in the UI somehow
            const msgEl = document.getElementById(`msg-${msgIndex}`);
            const btnEl = msgEl.querySelector('.build-prompt');
            const originalText = btnEl.innerHTML;
            btnEl.innerHTML = `<i data-lucide="loader" class="spin" style="width: 14px; height: 14px;"></i> Generating...`;
            btnEl.disabled = true;
            lucide.createIcons();

            try {
                const res = await fetch('/api/build-prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: context })
                });
                const data = await res.json();
                
                // Append the build prompt block to the DOM specifically under this message
                const block = document.createElement('div');
                block.className = 'build-prompt-block';
                block.innerHTML = `
                    <div class="build-prompt-header">
                        <span><i data-lucide="zap" style="width: 14px; height: 14px; vertical-align: middle;"></i> Generated Build Prompt</span>
                        <button class="action-btn" onclick='copyText(${JSON.stringify(data.result)})'>
                            <i data-lucide="copy" style="width: 14px; height: 14px;"></i> Copy
                        </button>
                    </div>
                    <div class="message-content">${marked.parse(data.result)}</div>
                `;
                msgEl.appendChild(block);
                lucide.createIcons();
                chatDiv.scrollTop = chatDiv.scrollHeight;
            } catch(e) {
                alert('Failed to generate prompt');
            } finally {
                btnEl.innerHTML = originalText;
                btnEl.disabled = false;
                lucide.createIcons();
            }
        }

        function render() {
            container.innerHTML = '';
            messages.forEach((m, i) => {
                const row = document.createElement('div');
                row.className = 'message-row';
                row.id = `msg-${i}`;

                const msg = document.createElement('div');
                msg.className = `message ${m.role}`;
                
                const content = document.createElement('div');
                content.className = 'message-content';
                content.innerHTML = marked.parse(m.content);
                msg.appendChild(content);

                row.appendChild(msg);

                // Footer for copy / model tags / actions
                const footer = document.createElement('div');
                footer.className = 'msg-footer';
                if (m.role === 'user') footer.style.justifyContent = 'flex-end';
                
                // Copy button
                const copyBtn = document.createElement('button');
                copyBtn.className = 'action-btn';
                copyBtn.innerHTML = `<i data-lucide="copy" style="width: 14px; height: 14px;"></i> Copy`;
                copyBtn.onclick = () => copyText(m.content);
                footer.appendChild(copyBtn);

                if (m.role === 'assistant') {
                    if (m.model_used) {
                        const tag = document.createElement('div');
                        tag.className = 'model-tag';
                        tag.innerHTML = `<i data-lucide="cpu" style="width: 12px; height: 12px;"></i> ${m.model_used}`;
                        footer.appendChild(tag);
                    }
                    
                    const promptBtn = document.createElement('button');
                    promptBtn.className = 'action-btn build-prompt';
                    promptBtn.innerHTML = `<i data-lucide="zap" style="width: 14px; height: 14px;"></i> Turn into build prompt`;
                    promptBtn.onclick = () => generateBuildPrompt(i);
                    footer.appendChild(promptBtn);
                }

                row.appendChild(footer);
                container.appendChild(row);
            });
            lucide.createIcons();
            
            // Apply highlight.js to newly added code blocks
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        async function load() {
            try {
                const res = await fetch('/api/chat');
                const data = await res.json();
                messages = data.messages || [];
                render();
            } catch(e) {
                console.error(e);
            }
        }

        document.getElementById('form').onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if(!text) return;
            
            // Check for /prompt shortcut
            if (text.toLowerCase() === '/prompt') {
                input.value = '';
                generateBuildPrompt(messages.length - 1);
                return;
            }

            messages.push({ role: 'user', content: text });
            input.value = '';
            btn.disabled = true;
            render();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages })
                });
                const data = await res.json();
                messages = data.allMessages;
                render();
            } catch(err) {
                alert('Error sending message');
            }
            btn.disabled = false;
            input.focus();
        };

        // --- Settings Modal ---
        const modal = document.getElementById('settings-modal');
        const textarea = document.getElementById('models-textarea');

        async function openSettings() {
            modal.style.display = 'flex';
            try {
                const res = await fetch('/api/models');
                const data = await res.json();
                textarea.value = JSON.stringify(data.models, null, 2);
            } catch(e) {
                textarea.value = 'Error fetching models';
            }
        }

        function closeSettings() {
            modal.style.display = 'none';
        }

        async function saveSettings() {
            try {
                const models = JSON.parse(textarea.value);
                await fetch('/api/models', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ models })
                });
                closeSettings();
            } catch(e) {
                alert("Invalid JSON format");
            }
        }

        // Initialize
        load();
    </script>
</body>
</html>
